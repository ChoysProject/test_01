server:
  port: 8080

logging:
  charset:
    console: UTF-8
    file: UTF-8

spring:
  application:
    name: external-integration
  # H2 인메모리 DB
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# 외부 거래소(krxExchange) 연계 장애 방어
resilience4j:
  circuitbreaker:
    instances:
      krxExchange:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      krxExchange:
        timeout-duration: 2s
